<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ESP32 6WD BLE Controller</title>

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 10%, rgba(34, 211, 238, 0.25), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.25), transparent 30%),
        linear-gradient(160deg, #020617, #0f172a 55%, #020617);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .app {
      width: 100%;
      max-width: 430px;
      padding: 18px;
      text-align: center;
    }

    .glass {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .header {
      border-radius: 28px;
      padding: 18px 16px;
      margin-bottom: 14px;
    }

    .btIcon {
      font-size: 42px;
      filter: drop-shadow(0 0 14px rgba(56,189,248,0.9));
    }

    h1 {
      margin: 5px 0 2px;
      font-size: 28px;
      letter-spacing: 0.5px;
    }

    .sub {
      font-size: 13px;
      opacity: 0.75;
    }

    .connect {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(145deg, #38bdf8, #2563eb);
      color: white;
      font-size: 18px;
      font-weight: 800;
      box-shadow:
        0 12px 25px rgba(37,99,235,0.35),
        inset 0 2px 4px rgba(255,255,255,0.28);
      margin: 14px 0;
    }

    .connect:active {
      transform: scale(0.97);
    }

    .terminal {
      text-align: left;
      height: 126px;
      overflow: hidden;
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 16px;
      background: rgba(3, 7, 18, 0.82);
      border: 1px solid rgba(34, 211, 238, 0.25);
      box-shadow:
        inset 0 0 22px rgba(34,211,238,0.08),
        0 10px 30px rgba(0,0,0,0.35);
      font-family: "SF Mono", "Menlo", "Monaco", "Courier New", monospace;
      font-size: 12px;
      color: #67e8f9;
      line-height: 1.45;
    }

    .terminalTop {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
    }

    .dot:nth-child(2) { background: #f59e0b; }
    .dot:nth-child(3) { background: #22c55e; }

    #terminalText {
      white-space: pre-line;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
    }

    .btn {
      height: 78px;
      border: none;
      border-radius: 25px;
      color: white;
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(145deg, rgba(71,85,105,0.95), rgba(15,23,42,0.95));
      box-shadow:
        0 12px 26px rgba(0,0,0,0.46),
        inset 0 3px 4px rgba(255,255,255,0.18),
        inset 0 -4px 8px rgba(0,0,0,0.28);
    }

    .btn:active {
      transform: scale(0.94);
      background: linear-gradient(145deg, #64748b, #1e293b);
    }

    .stop {
      background: linear-gradient(145deg, #fb7185, #b91c1c);
      font-size: 20px;
    }

    .speedBox {
      border-radius: 24px;
      padding: 16px;
    }

    .speedTitle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .speedValue {
      font-size: 22px;
      color: #67e8f9;
      font-family: "SF Mono", "Menlo", monospace;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #38bdf8;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header glass">
      <div class="btIcon">ᛒ</div>
      <h1>ESP32 6WD</h1>
      <div class="sub">Bluetooth Low Energy Web Controller</div>
    </div>

    <button class="connect" onclick="connectBLE()">Connect Bluetooth</button>

    <div class="terminal">
      <div class="terminalTop">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div id="terminalText">aman@esp32-6wd:~$ BLE terminal ready
> waiting for Bluetooth connection...</div>
    </div>

    <div class="grid">
      <div></div>
      <button class="btn"
        ontouchstart="moveCmd('B','FORWARD')"
        onmousedown="moveCmd('B','FORWARD')"
        ontouchend="stopCmd()"
        onmouseup="stopCmd()">▲</button>
      <div></div>

      <button class="btn"
        ontouchstart="moveCmd('R','LEFT')"
        onmousedown="moveCmd('R','LEFT')"
        ontouchend="stopCmd()"
        onmouseup="stopCmd()">◀</button>

      <button class="btn stop" onclick="stopCmd()">STOP</button>

      <button class="btn"
        ontouchstart="moveCmd('L','RIGHT')"
        onmousedown="moveCmd('L','RIGHT')"
        ontouchend="stopCmd()"
        onmouseup="stopCmd()">▶</button>

      <div></div>
      <button class="btn"
        ontouchstart="moveCmd('F','BACKWARD')"
        onmousedown="moveCmd('F','BACKWARD')"
        ontouchend="stopCmd()"
        onmouseup="stopCmd()">▼</button>
      <div></div>
    </div>

    <div class="speedBox glass">
      <div class="speedTitle">
        <span>Speed Lever</span>
        <span class="speedValue" id="speedValue">255</span>
      </div>
      <input type="range" min="0" max="255" value="255" id="speedSlider" oninput="updateSpeed(this.value)" />
    </div>
  </div>

  <script>
    let device;
    let server;
    let service;
    let rxCharacteristic;

    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const RX_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

    const terminal = document.getElementById("terminalText");

    function logLine(text) {
      const time = new Date().toLocaleTimeString();
      terminal.innerText += `\n[${time}] ${text}`;
      const lines = terminal.innerText.split("\n");
      if (lines.length > 7) terminal.innerText = lines.slice(lines.length - 7).join("\n");
    }

    async function connectBLE() {
      try {
        logLine("scanning BLE devices...");

        device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: "ESP32_6WD" }],
          optionalServices: [SERVICE_UUID]
        });

        device.addEventListener("gattserverdisconnected", onDisconnected);

        logLine("connecting to " + device.name + "...");
        server = await device.gatt.connect();

        logLine("opening Nordic UART service...");
        service = await server.getPrimaryService(SERVICE_UUID);
        rxCharacteristic = await service.getCharacteristic(RX_UUID);

        logLine("connected via Bluetooth ✅");

        await sendCommand("S", "safety stop");
        await sendCommand("V255", "speed set 255");

      } catch (error) {
        logLine("ERROR: " + error.message);
      }
    }

    function onDisconnected() {
      rxCharacteristic = null;
      logLine("Bluetooth disconnected");
    }

    async function sendCommand(cmd, label = "") {
      if (!rxCharacteristic) {
        logLine("connect Bluetooth first");
        return;
      }

      try {
        const encoder = new TextEncoder();
        await rxCharacteristic.writeValue(encoder.encode(cmd));
        logLine(`TX via BLE -> ${cmd}${label ? " / " + label : ""}`);
      } catch (error) {
        logLine("send failed: " + error.message);
      }
    }

    function moveCmd(cmd, label) {
      sendCommand(cmd, label);
    }

    function stopCmd() {
      sendCommand("S", "STOP");
    }

    function updateSpeed(value) {
      document.getElementById("speedValue").innerText = value;
      sendCommand("V" + value, "speed lever");
    }

    document.addEventListener("contextmenu", e => e.preventDefault());
  </script>
</body>
</html>
